<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando | Inglês no seu Ritmo</title>
    <meta http-equiv="refresh" content="0; url=home-aluno.html">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            font-family: Inter, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        a {
            color: #facc15;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div>
        <p>Redirecionando para a área do aluno...</p>
        <p><a id="fallback-link" href="home-aluno.html">Clique aqui se não redirecionar.</a></p>
    </div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const studentId = params.get('studentId');
            const target = studentId ? `home-aluno.html?studentId=${encodeURIComponent(studentId)}` : 'home-aluno.html';
            const fallbackLink = document.getElementById('fallback-link');
            if (fallbackLink) fallbackLink.href = target;
            window.location.replace(target);
        })();
    </script>
</body>
</html>
