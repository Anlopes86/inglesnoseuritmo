<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponte A2-B1 | Ingles no seu Ritmo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .slide { display: none; }
        .slide.active { display: block; animation: fadeIn 0.35s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .lesson-shell {
            background:
                radial-gradient(circle at top left, rgba(45, 212, 191, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(245, 158, 11, 0.12), transparent 32%),
                linear-gradient(180deg, #f7fffe 0%, #ffffff 100%);
        }
        .surface { background: rgba(255, 255, 255, 0.95); border: 1px solid #e2e8f0; box-shadow: 0 20px 40px -32px rgba(15, 23, 42, 0.45); }
        .hero-card { background: linear-gradient(135deg, #ecfeff 0%, #ffffff 60%, #fff7ed 100%); border: 1px solid #99f6e4; }
        .chip { display: inline-flex; align-items: center; gap: 0.45rem; padding: 0.55rem 0.9rem; border-radius: 999px; background: white; border: 1px solid #99f6e4; font-size: 0.92rem; font-weight: 600; color: #0f766e; }
    </style>
    <link rel="stylesheet" href="prepb1-lesson-theme.css">
</head>
<body class="lesson-shell bg-teal-50 text-slate-800 min-h-screen">
    <header class="shadow-sm sticky top-0 z-20 bg-white/90 backdrop-blur">
        <div class="container mx-auto px-6 py-3 flex justify-between items-center gap-4">
            <a href="prepb1.html" class="text-base font-bold text-teal-700 hover:text-teal-900 flex items-center gap-2">
                <i class="fas fa-chevron-left"></i> Voltar para a ponte A2-B1
            </a>
            <div class="text-center">
                <h1 id="lesson-title" class="text-sm md:text-base font-bold text-slate-900">Ponte A2-B1</h1>
                <p id="slide-title-header" class="text-xs text-slate-400 font-semibold"></p>
            </div>
            <div id="slide-counter" class="text-sm font-semibold text-slate-500 bg-slate-100 px-3 py-1 rounded-full">1 / 9</div>
        </div>
        <div class="w-full bg-slate-200 h-1.5">
            <div id="progress-bar" class="bg-teal-600 h-1.5 transition-all duration-500" style="width: 11.11%;"></div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8 pb-28 max-w-6xl">
        <div id="slides-root"></div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full bg-white border-t z-20">
        <div class="container mx-auto px-6 h-20 max-w-6xl flex justify-between items-center">
            <button id="prev-btn" class="bg-slate-200 text-slate-700 font-bold py-3 px-7 rounded-xl disabled:opacity-40 transition">
                <i class="fas fa-chevron-left mr-1"></i> Anterior
            </button>
            <button id="next-btn" class="bg-teal-700 text-white font-bold py-3 px-7 rounded-xl transition hover:bg-teal-800">
                Proximo <i class="fas fa-chevron-right ml-1"></i>
            </button>
            <button id="finish-lesson-btn" class="hidden bg-blue-600 text-white font-bold py-3 px-7 rounded-xl transition hover:bg-blue-700">
                <i class="fas fa-check mr-2"></i>Finalizar aula
            </button>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/progress-manager.js"></script>
    <script src="../js/prepb1-lessons-data.js"></script>
    <script src="../js/prepb1-lesson-player.js"></script>
    <script src="prepb1-lesson-theme.js"></script>
</body>
</html>
