<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1 Lesson | Ingles no seu Ritmo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .slide { display: none; }
        .slide.active { display: block; animation: fadeIn 0.35s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .lesson-shell {
            background:
                radial-gradient(circle at top left, rgba(251, 113, 133, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(244, 63, 94, 0.12), transparent 32%),
                linear-gradient(180deg, #fffafc 0%, #fff 100%);
        }
        .surface { background: rgba(255, 255, 255, 0.95); border: 1px solid #f1f5f9; box-shadow: 0 20px 40px -32px rgba(15, 23, 42, 0.45); }
        .hero-card { background: linear-gradient(135deg, #fff1f2 0%, #ffffff 55%, #fff7ed 100%); border: 1px solid #fecdd3; }
        .chip { display: inline-flex; align-items: center; gap: 0.45rem; padding: 0.55rem 0.9rem; border-radius: 999px; background: white; border: 1px solid #fecdd3; font-size: 0.92rem; font-weight: 600; color: #9f1239; }
        .vocab-card { perspective: 1000px; cursor: pointer; min-height: 180px; }
        .vocab-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.65s; transform-style: preserve-3d; min-height: 180px; }
        .vocab-card.flipped .vocab-card-inner { transform: rotateY(180deg); }
        .vocab-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 1.25rem; padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; }
        .vocab-front { background: white; border: 1px solid #fecdd3; }
        .vocab-back { background: linear-gradient(135deg, #e11d48 0%, #fb7185 100%); color: white; transform: rotateY(180deg); }
        .practice-input { width: 10rem; max-width: 100%; border: none; border-bottom: 2px solid #cbd5e1; background: transparent; padding: 0.15rem 0.35rem; text-align: center; outline: none; font-weight: 700; }
        .practice-input:focus { border-color: #e11d48; }
        .practice-input.correct { border-color: #16a34a; color: #166534; }
        .practice-input.incorrect { border-color: #dc2626; color: #b91c1c; }
        .practice-input.revealed { border-color: #d97706; color: #b45309; }
        .answer-btn { background: none; border: none; color: #94a3b8; cursor: pointer; }
        .answer-btn:hover { color: #e11d48; }
        .choice-btn { transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease; }
        .choice-btn:hover { transform: translateY(-1px); }
        .choice-btn.correct { border-color: #16a34a; background: #f0fdf4; color: #166534; }
        .choice-btn.incorrect { border-color: #dc2626; background: #fef2f2; color: #b91c1c; }
        .speak-btn { display: inline-flex; align-items: center; gap: 0.4rem; background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; padding: 0.35rem 0.75rem; border-radius: 999px; font-size: 0.86rem; font-weight: 700; }
        .speak-btn:hover { background: #ffe4e6; }
    </style>
</head>
<body class="lesson-shell bg-rose-50 text-slate-800 min-h-screen">
    <header class="shadow-sm sticky top-0 z-20 bg-white/90 backdrop-blur">
        <div class="container mx-auto px-6 py-3 flex justify-between items-center gap-4">
            <a href="b1.html" class="text-base font-bold text-rose-600 hover:text-rose-800 flex items-center gap-2">
                <i class="fas fa-chevron-left"></i> Voltar para B1
            </a>
            <div class="text-center">
                <h1 id="lesson-title" class="text-sm md:text-base font-bold text-slate-900">B1 Lesson</h1>
                <p id="slide-title-header" class="text-xs text-slate-400 font-semibold"></p>
            </div>
            <div id="slide-counter" class="text-sm font-semibold text-slate-500 bg-slate-100 px-3 py-1 rounded-full">1 / 8</div>
        </div>
        <div class="w-full bg-slate-200 h-1.5">
            <div id="progress-bar" class="bg-rose-500 h-1.5 transition-all duration-500" style="width: 12.5%;"></div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8 pb-28 max-w-6xl">
        <div id="slides-root"></div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full bg-white border-t z-20">
        <div class="container mx-auto px-6 h-20 max-w-6xl flex justify-between items-center">
            <button id="prev-btn" class="bg-slate-200 text-slate-700 font-bold py-3 px-7 rounded-xl disabled:opacity-40 transition">
                <i class="fas fa-chevron-left mr-1"></i> Anterior
            </button>
            <button id="next-btn" class="bg-rose-600 text-white font-bold py-3 px-7 rounded-xl transition hover:bg-rose-700">
                Proximo <i class="fas fa-chevron-right ml-1"></i>
            </button>
            <button id="finish-lesson-btn" class="hidden bg-blue-600 text-white font-bold py-3 px-7 rounded-xl transition hover:bg-blue-700">
                <i class="fas fa-check mr-2"></i>Finalizar aula
            </button>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/progress-manager.js"></script>
    <script src="../js/b1-lessons-data.js"></script>
    <script src="../js/b1-lesson-player.js"></script>
</body>
</html>
